name: Feature Request
description: Suggest an idea for Localcode
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem?
      placeholder: I'm always frustrated when...
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: It would be great if Localcode could...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions you've considered.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core CLI
        - VS Code Extension
        - Agent System
        - Settings/Config
        - Documentation
        - Other
    validations:
      required: true
